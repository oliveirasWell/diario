name: CI

on:
  push:
    branches: [main, v3]
  pull_request:
    branches: [main, v3]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://localhost:27017/diario-ci
      NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-chars
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @diario/db run generate

      - name: GraphQL codegen
        run: pnpm --filter web codegen

      - name: Check generated GraphQL types
        run: git diff --exit-code apps/web/src/gql/

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm --filter web typecheck

      - name: Unit and integration tests
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
